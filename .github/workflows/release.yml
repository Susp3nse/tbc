name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Enable pnpm
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build rotation
        run: pnpm --filter @menagerie/tbc-rotation build

      - name: Resolve release notes
        id: tag_msg
        # Single source of truth: the changelog content-collection entry for this tag
        # (apps/website/src/content/changelog/<tag>.md). Strip the YAML frontmatter and use the
        # markdown body as the GitHub Release body.
        # Fall back to the annotated tag message if the changelog file is missing.
        env:
          TAG: ${{ github.ref_name }}
        run: |
          CHANGELOG="apps/website/src/content/changelog/${TAG}.md"
          if [ -f "$CHANGELOG" ]; then
            # Print every line after the second '---' (end of frontmatter), preserving body markdown.
            BODY=$(awk 'f>=2{print} /^---$/{f++}' "$CHANGELOG")
          else
            git fetch origin tag "$TAG" --force
            BODY=$(git tag -l --format='%(contents)' "$TAG" 2>/dev/null || echo "")
          fi
          echo "body<<EOF" >> "$GITHUB_OUTPUT"
          echo "${BODY:-Release ${TAG}}" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        id: release
        uses: softprops/action-gh-release@v2
        with:
          body: ${{ steps.tag_msg.outputs.body }}
          files: apps/tbc-rotation/output/TellMeWhen.lua
