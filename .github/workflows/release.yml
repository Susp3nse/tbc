name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Enable pnpm
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build rotation
        run: pnpm --filter @flux/tbc-rotation build

      - name: Resolve release notes
        id: tag_msg
        # Single source of truth: the changelog content-collection entry for this tag
        # (apps/website/src/content/changelog/<tag>.md). Strip the YAML frontmatter and use the
        # markdown body as the GitHub Release body — which the Discord webhook below also reuses.
        # Fall back to the annotated tag message if the changelog file is missing.
        env:
          TAG: ${{ github.ref_name }}
        run: |
          CHANGELOG="apps/website/src/content/changelog/${TAG}.md"
          if [ -f "$CHANGELOG" ]; then
            # Print every line after the second '---' (end of frontmatter), preserving body markdown.
            BODY=$(awk 'f>=2{print} /^---$/{f++}' "$CHANGELOG")
          else
            git fetch origin tag "$TAG" --force
            BODY=$(git tag -l --format='%(contents)' "$TAG" 2>/dev/null || echo "")
          fi
          echo "body<<EOF" >> "$GITHUB_OUTPUT"
          echo "${BODY:-Release ${TAG}}" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        id: release
        uses: softprops/action-gh-release@v2
        with:
          body: ${{ steps.tag_msg.outputs.body }}
          files: apps/tbc-rotation/output/TellMeWhen.lua

      - name: Notify Discord
        if: success()
        continue-on-error: true
        env:
          WEBHOOK_SECRET: ${{ secrets.WEBHOOK_SECRET }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
          RELEASE_NOTES: ${{ steps.tag_msg.outputs.body }}
        run: |
          BODY=$(jq -nc \
            --arg tag "${{ github.ref_name }}" \
            --arg repo "${{ github.repository }}" \
            --arg actor "${{ github.actor }}" \
            --arg now "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            --arg notes "$RELEASE_NOTES" \
            '{
              action: "published",
              release: {
                tag_name: $tag,
                name: $tag,
                html_url: "https://github.com/\($repo)/releases/tag/\($tag)",
                body: $notes,
                published_at: $now,
                author: {
                  login: $actor,
                  avatar_url: "https://github.com/\($actor).png",
                  html_url: "https://github.com/\($actor)"
                }
              }
            }')
          SIG="sha256=$(echo -n "$BODY" | openssl dgst -sha256 -hmac "$WEBHOOK_SECRET" | awk '{print $2}')"
          curl -s -X POST "http://${VPS_HOST}:3000/webhook/github" \
            -H "Content-Type: application/json" \
            -H "X-Hub-Signature-256: ${SIG}" \
            -H "X-GitHub-Event: release" \
            -d "$BODY"
